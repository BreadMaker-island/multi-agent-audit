# Nginx 配置文件
# 部署位置: /etc/nginx/sites-available/multi-agent-audit
# 软链接: ln -s /etc/nginx/sites-available/multi-agent-audit /etc/nginx/sites-enabled/

server {
    listen 80;
    server_name _;  # 替换为你的域名或 IP

    # 安全头
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # 静态文件
    location /static/ {
        alias /opt/multi-agent-audit/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 媒体文件
    location /media/ {
        alias /opt/multi-agent-audit/media/;
        expires 7d;
    }

    # 代理到 Gunicorn
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置
        proxy_connect_timeout 300;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    # 请求体大小限制 (代码提交可能较大)
    client_max_body_size 10M;
}
