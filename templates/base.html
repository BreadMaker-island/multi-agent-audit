{% load static %}
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Multi-Agent 代码审计系统{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <!-- Highlight.js 代码高亮 -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css" rel="stylesheet">

    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #818cf8;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --border-color: #334155;
            --success: #22c55e;
            --warning: #f59e0b;
            --danger: #ef4444;
            --info: #3b82f6;
        }

        body {
            background: var(--bg-dark);
            color: var(--text-primary);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }

        /* 导航栏 */
        .navbar-custom {
            background: linear-gradient(135deg, #1e1b4b 0%, #312e81 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 0.8rem 0;
        }
        .navbar-custom .navbar-brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.2rem;
            letter-spacing: -0.02em;
        }
        .navbar-custom .navbar-brand i {
            color: var(--primary-light);
        }
        .navbar-custom .nav-link {
            color: rgba(255,255,255,0.7);
            font-size: 0.9rem;
            padding: 0.5rem 1rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        .navbar-custom .nav-link:hover,
        .navbar-custom .nav-link.active {
            color: #fff;
            background: rgba(255,255,255,0.1);
        }

        /* 卡片 */
        .card-custom {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .card-custom:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        .card-custom .card-header {
            background: transparent;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
            padding: 1rem 1.25rem;
        }

        /* 统计卡片 */
        .stat-card {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 0.75rem;
            padding: 1.5rem;
            text-align: center;
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }
        .stat-card .stat-value {
            font-size: 2.5rem;
            font-weight: 800;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
        .stat-card .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* 代码编辑器区域 */
        .code-editor {
            background: #1a1a2e;
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
            font-size: 0.9rem;
            color: #e2e8f0;
            padding: 1rem;
            line-height: 1.6;
            resize: vertical;
            min-height: 300px;
        }
        .code-editor:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.3);
            outline: none;
        }

        /* 严重程度标签 */
        .badge-critical { background: #dc2626; }
        .badge-high { background: var(--danger); }
        .badge-medium { background: var(--warning); color: #000; }
        .badge-low { background: var(--info); }
        .badge-info { background: #6366f1; }

        /* 代码块 */
        pre code {
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
        }

        /* 按钮 */
        .btn-primary-custom {
            background: linear-gradient(135deg, var(--primary) 0%, #7c3aed 100%);
            border: none;
            font-weight: 600;
            padding: 0.6rem 2rem;
            border-radius: 0.5rem;
            transition: all 0.2s;
        }
        .btn-primary-custom:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 15px rgba(79, 70, 229, 0.4);
        }

        /* 表格 */
        .table-custom {
            color: var(--text-primary);
        }
        .table-custom thead th {
            background: rgba(79, 70, 229, 0.15);
            border-bottom: 2px solid var(--primary);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .table-custom tbody td {
            border-bottom: 1px solid var(--border-color);
            vertical-align: middle;
        }
        .table-custom tbody tr:hover {
            background: rgba(255,255,255,0.03);
        }

        /* Agent 状态指示器 */
        .agent-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
            margin-right: 6px;
        }
        .agent-dot.success { background: var(--success); }
        .agent-dot.failed { background: var(--danger); }

        /* 加载动画 */
        .spinner-grow-sm {
            width: 1rem;
            height: 1rem;
        }

        /* 页面容器 */
        .page-container {
            padding: 2rem 0;
        }

        /* 页脚 */
        .footer {
            border-top: 1px solid var(--border-color);
            padding: 1.5rem 0;
            margin-top: 3rem;
            color: var(--text-secondary);
            font-size: 0.8rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-custom">
        <div class="container">
            <a class="navbar-brand" href="{% url 'dashboard' %}">
                <i class="bi bi-shield-check"></i> Multi-Agent 代码审计系统
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}"
                           href="{% url 'dashboard' %}">
                            <i class="bi bi-speedometer2"></i> 仪表盘
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'submit' %}active{% endif %}"
                           href="{% url 'submit' %}">
                            <i class="bi bi-code-slash"></i> 提交审计
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.resolver_match.url_name == 'projects' %}active{% endif %}"
                           href="{% url 'projects' %}">
                            <i class="bi bi-folder2-open"></i> 项目列表
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/api/" target="_blank">
                            <i class="bi bi-braces"></i> API
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- 主内容区 -->
    <div class="container page-container">
        {% block content %}{% endblock %}
    </div>

    <!-- 页脚 -->
    <div class="container">
        <div class="footer text-center">
            <i class="bi bi-robot"></i> 基于 Multi-Agent 架构的自动化代码重构与安全审计系统 &copy; 2026
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Highlight.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/python.min.js"></script>
    <script>hljs.highlightAll();</script>
    {% block extra_js %}{% endblock %}
</body>
</html>
